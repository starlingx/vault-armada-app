- hosts: all
  tasks:
    - name: Upload security reports
      synchronize:
        src: "{{ zuul.project.src_dir }}/python3-k8sapp-vault/k8sapp_vault/UTCoverage/"
        dest: "{{ zuul.executor.log_root }}/security/"
        mode: pull
      failed_when: false
    - name: Return security report artifact URL
      zuul_return:
        data:
          zuul:
            artifacts:
              - name: "Security Report"
                url: "security/security_report.txt"
